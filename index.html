<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hridhiyam Business OS V3</title>
<style>
:root{--bg:#f8f6ff;--panel:#fff;--ink:#09051d;--muted:#6d6380;--brand:#26004d;--brand2:#7c3aed;--line:#e4d8ff;--soft:#f1eaff;--good:#059669;--warn:#f59e0b;--bad:#dc2626;--shadow:0 18px 50px rgba(38,0,77,.10)}
.dark{--bg:#0c0616;--panel:#160c28;--ink:#fff;--muted:#b8adc9;--brand:#8b5cf6;--brand2:#c084fc;--line:#332244;--soft:#25153d;--shadow:0 18px 50px rgba(0,0,0,.35)}
*{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#f9f7ff 0%,#f5fff9 100%);color:var(--ink)}body.dark{background:#0c0616}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,#17002f,#331070);color:#fff;padding:22px 18px;position:sticky;top:0;height:100vh;overflow:auto}.logo{font-size:24px;font-weight:950}.ver{opacity:.75;margin:5px 0 18px}.roleBadge{font-size:12px;background:rgba(255,255,255,.14);border-radius:12px;padding:9px 12px;margin-bottom:18px}.nav{display:grid;gap:8px}.nav button{border:0;background:transparent;color:#fff;text-align:left;padding:13px 15px;border-radius:15px;font-weight:850;cursor:pointer}.nav button.active,.nav button:hover{background:rgba(255,255,255,.18)}.main{padding:22px 28px 50px;overflow:hidden}.top{display:grid;grid-template-columns:1fr 190px 112px;gap:12px;align-items:center;position:sticky;top:0;background:linear-gradient(135deg,#f9f7ff 0%,#f5fff9 100%);z-index:5;padding-bottom:14px}.dark .top{background:#0c0616}.input,select,textarea{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:15px;padding:13px 15px;font-size:15px;outline:none}.btn{border:0;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:12px 17px;font-weight:900;cursor:pointer;box-shadow:0 12px 26px rgba(124,58,237,.22)}.btn.ghost{background:var(--panel);color:var(--brand);border:1px solid var(--line);box-shadow:none}.btn.good{background:linear-gradient(135deg,#059669,#34d399)}.btn.bad{background:linear-gradient(135deg,#dc2626,#fb7185)}h1{font-size:34px;margin:18px 0 6px}.sub{color:var(--muted);margin-bottom:18px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}.kpi .label{color:var(--muted)}.kpi .num{font-size:34px;font-weight:950;margin-top:10px}.pill{display:inline-flex;padding:7px 10px;border-radius:999px;background:var(--soft);color:var(--brand);font-weight:900;font-size:12px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.tablewrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:820px}.table th,.table td{padding:13px 12px;border-bottom:1px solid var(--line);font-size:14px;text-align:left}.table th{background:var(--soft);color:var(--brand);font-size:12px;text-transform:uppercase}.status{border-radius:999px;padding:7px 10px;font-weight:900;font-size:12px;display:inline-block}.Ready{background:#eef2ff;color:#4338ca}.Progress{background:#fff7ed;color:#c2410c}.Review{background:#ecfeff;color:#0e7490}.Revision{background:#fef2f2;color:#b91c1c}.Completed{background:#ecfdf5;color:#047857}.lock{border:1px dashed var(--line);background:var(--soft);padding:18px;border-radius:18px}.progressbar{height:12px;background:var(--soft);border-radius:999px;overflow:hidden}.progressbar span{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:999px}.modal{position:fixed;inset:0;background:rgba(9,3,20,.58);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}.modal.show{display:flex}.box{width:min(850px,96vw);max-height:90vh;overflow:auto;background:var(--panel);border-radius:28px;padding:24px;border:1px solid var(--line)}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.toast{position:fixed;right:22px;bottom:22px;background:#111;color:#fff;padding:14px 18px;border-radius:16px;display:none;z-index:30}.toast.show{display:block}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.main{padding:16px}.top,.grid4,.grid3,.grid2,.formgrid{grid-template-columns:1fr}.table{min-width:720px}}
</style>
</head>
<body>
<div class="app"><aside class="side"><div class="logo">HRIDHIYAM OS</div><div class="ver">v3.0 Permission Fixed</div><div class="roleBadge" id="roleBadge"></div><div class="nav" id="nav"></div></aside><main class="main"><div class="top"><input id="search" class="input" placeholder="Search only allowed data..."/><select id="role"></select><button class="btn ghost" id="theme">Theme</button></div><section id="view"></section></main></div>
<div class="modal" id="modal"><div class="box"><div class="row" style="justify-content:space-between"><h2 id="modalTitle">Task</h2><button class="btn ghost" onclick="closeModal()">Close</button></div><div id="modalBody"></div></div></div><div class="toast" id="toast"></div>
<script>
const state={role:'Founder',user:'Sandhya',dark:false,tab:'Dashboard',query:'',tasks:[
{id:'TASK-000001',name:'Design Instagram Feed Post',business:'SIA Jewels',department:'Graphic Design',assignees:['Rahul'],lead:'Priya',priority:'High',status:'Ready',due:'2026-07-09',freq:'Daily',estimate:30,actual:0,watchers:['Sandhya'],sop:'SOP/design-feed',tags:'social,design',desc:'Create premium feed post.'},
{id:'TASK-000002',name:'Edit Product Reel',business:'SIA Jewels',department:'Video Editing',assignees:['Aman'],lead:'Priya',priority:'High',status:'Progress',due:'2026-07-09',freq:'Daily',estimate:45,actual:20,watchers:['Sandhya'],sop:'SOP/reel',tags:'reel,video',desc:'Edit short product reel.'},
{id:'TASK-000003',name:'Upload Reel on Instagram',business:'SIA Jewels',department:'Social Media',assignees:['Neha'],lead:'Neha',priority:'Medium',status:'Review',due:'2026-07-10',freq:'Daily',estimate:15,actual:10,watchers:['Sandhya'],sop:'SOP/upload',tags:'instagram',desc:'Upload reel after approval.'},
{id:'TASK-000004',name:'Update Sales Sheet',business:'SBX Media',department:'Finance',assignees:['Priya'],lead:'Priya',priority:'Medium',status:'Completed',due:'2026-07-08',freq:'Daily',estimate:20,actual:18,watchers:['Sandhya'],sop:'SOP/finance',tags:'finance',desc:'Update finance tracker.'}
],employees:[['Rahul','Graphic Design','Employee','Priya'],['Aman','Video Editing','Employee','Priya'],['Neha','Social Media','Team Lead','Neha'],['Priya','Operations','Manager','Sandhya'],['Sandhya','Founder','Founder','-']],biz:['SIA Jewels','SBX Media','Westory','YOLOX'],deps:['Graphic Design','Video Editing','Social Media','Finance','Website','Customer Support']};
const roles=['Founder','Admin','Manager','Team Lead','Employee','Intern'];
const allTabs=['Dashboard','Businesses','Departments','Employees','Task Library','Tasks','Task Generator','Attendance','Calendar','Reports','Settings'];
const tabAccess={Founder:allTabs,Admin:allTabs,Manager:['Dashboard','Employees','Tasks','Task Generator','Attendance','Calendar','Reports'], 'Team Lead':['Dashboard','Tasks','Attendance','Calendar','Reports'], Employee:['Dashboard','My Tasks','Attendance','Calendar'], Intern:['Dashboard','My Tasks','Attendance']};
function setUserByRole(){state.user=state.role==='Employee'||state.role==='Intern'?'Rahul':state.role==='Team Lead'?'Neha':state.role==='Manager'?'Priya':'Sandhya'}
function canSeeTask(t){if(['Founder','Admin'].includes(state.role))return true;if(state.role==='Manager')return t.lead===state.user||t.assignees.includes(state.user);if(state.role==='Team Lead')return t.lead===state.user||t.assignees.includes(state.user);return t.assignees.includes(state.user)}
function canTab(tab){return (tabAccess[state.role]||[]).includes(tab)}
function visibleTasks(){let q=state.query.toLowerCase();return state.tasks.filter(canSeeTask).filter(t=>!q||JSON.stringify(t).toLowerCase().includes(q))}
function admin(){return ['Founder','Admin'].includes(state.role)} function managerUp(){return ['Founder','Admin','Manager'].includes(state.role)}
function init(){document.body.classList.toggle('dark',state.dark);role.innerHTML=roles.map(r=>`<option ${r===state.role?'selected':''}>${r}</option>`).join('');roleBadge.innerHTML=`Login: <b>${state.user}</b><br>Role: ${state.role}`;let tabs=tabAccess[state.role]||[]; if(!tabs.includes(state.tab))state.tab=tabs[0]; nav.innerHTML=tabs.map(t=>`<button onclick="state.tab='${t}';render()" class="${state.tab===t?'active':''}">${t}</button>`).join('');role.onchange=e=>{state.role=e.target.value;setUserByRole();state.tab='Dashboard';render()};theme.onclick=()=>{state.dark=!state.dark;render()};search.oninput=e=>{state.query=e.target.value;render()}}
function title(){return `<h1>${state.tab}</h1><div class="sub">Current login: <b>${state.user}</b> (${state.role}). Permission backend-rule style logic se control hai; sirf UI hide nahi.</div>`}
function render(){init();const v=view,f=visibleTasks(),pending=f.filter(t=>t.status!=='Completed').length,done=f.filter(t=>t.status==='Completed').length,over=f.filter(t=>t.status!=='Completed'&&t.due<'2026-07-08').length;let h=title();if(state.tab==='Dashboard')v.innerHTML=h+`<div class="grid4"><div class="card kpi"><div class="label">Visible Tasks</div><div class="num">${f.length}</div></div><div class="card kpi"><div class="label">Pending</div><div class="num">${pending}</div></div><div class="card kpi"><div class="label">Completed</div><div class="num">${done}</div></div><div class="card kpi"><div class="label">Overdue</div><div class="num">${over}</div></div></div><br><div class="grid2"><div class="card"><h2>Permission Scope</h2><p>${scopeText()}</p><div class="lock"><b>Important:</b> Employee ke menu me Task Library, Employees, Businesses, Departments, Reports, Settings nahi aayenge.</div></div><div class="card"><h2>Today Overview</h2>${['Ready','Progress','Review','Revision','Completed'].map(s=>`<p>${s}: <b>${f.filter(t=>t.status===s).length}</b></p>`).join('')}<div class="progressbar"><span style="width:${f.length?Math.round(done/f.length*100):0}%"></span></div></div></div>`;
else if(state.tab==='Tasks'||state.tab==='My Tasks'||state.tab==='Task Library')v.innerHTML=h+taskPage(f,state.tab==='Task Library');
else if(state.tab==='Task Generator')v.innerHTML=h+(managerUp()?generatorPage():deny('Task Generator admin/manager only hai.'));
else if(state.tab==='Employees')v.innerHTML=h+(managerUp()?employeePage():deny('Employees list restricted hai.'));
else if(state.tab==='Businesses')v.innerHTML=h+(admin()?listPage('Businesses',state.biz):deny('Business Management admin only hai.'));
else if(state.tab==='Departments')v.innerHTML=h+(admin()?listPage('Departments',state.deps):deny('Department Management admin only hai.'));
else if(state.tab==='Attendance')v.innerHTML=h+attendancePage();
else if(state.tab==='Calendar')v.innerHTML=h+calendarPage(f);
else if(state.tab==='Reports')v.innerHTML=h+(state.role==='Employee'||state.role==='Intern'?deny('Employee ko reports access nahi milega.'):reportsPage(f));
else if(state.tab==='Settings')v.innerHTML=h+(admin()?settingsPage():deny('Settings admin only hai.'))}
function scopeText(){if(admin())return 'Full system access: all businesses, departments, employees, task library and reports.'; if(state.role==='Manager')return 'Manager: apni managed team/tasks and reports.'; if(state.role==='Team Lead')return 'Team Lead: sirf apni team + assigned tasks.'; return 'Employee/Intern: sirf apne assigned tasks. Dusre employees ka data hidden aur blocked.'}
function deny(msg){return `<div class="card"><h2>Access Denied</h2><p>${msg}</p></div>`}
function taskPage(f,library){if(library&&!admin())return deny('Master Task Library sirf Founder/Admin ko dikhegi.');return `<div class="row">${managerUp()?'<button class="btn" onclick="openTask()">+ New Task</button><button class="btn ghost" onclick="toast(\'Bulk Assign ready\')">Bulk Assign</button>':''}<button class="btn ghost" onclick="exportCSV()">Export CSV</button></div><br><div class="card tablewrap"><table class="table"><thead><tr><th>Task No</th><th>Task</th><th>Business</th><th>Dept</th><th>Assignees</th><th>Priority</th><th>Status</th><th>Time</th><th>Action</th></tr></thead><tbody>${f.map(t=>`<tr><td>${t.id}</td><td><b>${t.name}</b><br><span class="sub">${t.tags}</span></td><td>${t.business}</td><td>${t.department}</td><td>${t.assignees.join(', ')}</td><td>${t.priority}</td><td><span class="status ${t.status}">${t.status}</span></td><td>${t.actual}/${t.estimate}m</td><td><button class="btn ghost" onclick="openTask('${t.id}')">Open</button></td></tr>`).join('')}</tbody></table></div>`}
function generatorPage(){return `<div class="grid2"><div class="card"><h2>Generate Tasks</h2><div class="formgrid"><select id="gbiz">${state.biz.map(x=>`<option>${x}</option>`).join('')}</select><select id="gdep">${state.deps.map(x=>`<option>${x}</option>`).join('')}</select><select id="gemp">${state.employees.map(e=>`<option>${e[0]}</option>`).join('')}</select><select id="gfreq"><option>Daily</option><option>Weekly</option><option>Monthly</option><option>Yearly</option></select><input class="input" id="gdate" type="date" value="2026-07-09"><select><option>1 Day</option><option>7 Days</option><option>30 Days</option></select></div><br><button class="btn" onclick="generateTask()">Generate Tasks</button></div><div class="card"><h2>Work Queue</h2><p>Generated task employee ke My Tasks me dikh jayega.</p></div></div>`}
function employeePage(){return `<div class="card tablewrap"><table class="table"><thead><tr><th>Name</th><th>Department</th><th>Role</th><th>Lead</th><th>Assigned Tasks</th></tr></thead><tbody>${state.employees.map(e=>`<tr><td><b>${e[0]}</b></td><td>${e[1]}</td><td>${e[2]}</td><td>${e[3]}</td><td>${state.tasks.filter(t=>t.assignees.includes(e[0])).length}</td></tr>`).join('')}</tbody></table></div>`}
function listPage(name,arr){return `<div class="grid3">${arr.map(x=>`<div class="card"><h2>${x}</h2><p class="sub">${name.slice(0,-1)} module</p><span class="pill">Active</span></div>`).join('')}</div>`}
function attendancePage(){return `<div class="grid4"><button class="btn good" onclick="toast('Checked in')">Check In</button><button class="btn ghost" onclick="toast('Break started')">Break Start</button><button class="btn ghost" onclick="toast('Break ended')">Break End</button><button class="btn bad" onclick="toast('Checked out')">Check Out</button></div><br><div class="card tablewrap"><table class="table"><tr><th>Date</th><th>Employee</th><th>In</th><th>Out</th><th>Hours</th><th>Status</th></tr><tr><td>08/07/2026</td><td>${state.user}</td><td>10:05 AM</td><td>-</td><td>Running</td><td><span class="pill">Present</span></td></tr></table></div>`}
function calendarPage(f){return `<div class="grid3">${f.map(t=>`<div class="card"><span class="pill">${t.due}</span><h2>${t.name}</h2><p>${t.assignees.join(', ')} • ${t.status}</p></div>`).join('')||'<div class="card">No tasks</div>'}</div>`}
function reportsPage(f){let total=f.length,done=f.filter(t=>t.status==='Completed').length;return `<div class="grid3"><div class="card"><h2>Performance</h2><div class="progressbar"><span style="width:${total?done/total*100:0}%"></span></div><p>${done}/${total} completed</p></div><div class="card"><h2>Department</h2>${state.deps.slice(0,4).map(d=>`<p>${d}: <b>${f.filter(t=>t.department===d).length}</b></p>`).join('')}</div><div class="card"><h2>Business</h2>${state.biz.map(b=>`<p>${b}: <b>${f.filter(t=>t.business===b).length}</b></p>`).join('')}</div></div>`}
function settingsPage(){return `<div class="grid2"><div class="card"><h2>Settings</h2><p>Businesses, Departments, Roles, Permissions, Statuses, Priorities, Frequencies.</p><span class="pill">Version 3.0</span></div><div class="card"><h2>Future Ready</h2><p>Firebase/Supabase rules, API, backup, PWA, notifications ready architecture.</p></div></div>`}
function openTask(id){let t=state.tasks.find(x=>x.id===id)||{};modal.classList.add('show');modalTitle.textContent=id?'Task Details':'Create Task';let employeeMode=!managerUp();modalBody.innerHTML=`<div class="formgrid"><input class="input" id="mname" ${employeeMode?'disabled':''} value="${t.name||''}" placeholder="Task name"><input class="input" ${employeeMode?'disabled':''} id="mass" value="${(t.assignees||[state.user]).join(', ')}" placeholder="Assignees"><select id="mstatus">${['Ready','Progress','Review','Revision','Completed'].map(x=>`<option ${x===t.status?'selected':''}>${x}</option>`).join('')}</select><input class="input" ${employeeMode?'disabled':''} id="mdue" type="date" value="${t.due||'2026-07-09'}"></div><br><textarea id="mdesc" rows="4" ${employeeMode?'disabled':''}>${t.desc||''}</textarea><br><br><button class="btn" onclick="saveTask('${id||''}')">${employeeMode?'Update Status':'Save Task'}</button>`}
function saveTask(id){let item=id?state.tasks.find(x=>x.id===id):null;if(!item){item={id:'TASK-'+String(state.tasks.length+1).padStart(6,'0'),business:'SIA Jewels',department:'Graphic Design',priority:'Medium',freq:'Daily',estimate:30,actual:0,watchers:['Sandhya'],sop:'',tags:'custom'}} item.name=mname.value||item.name;item.assignees=mass.value.split(',').map(x=>x.trim()).filter(Boolean);item.status=mstatus.value;item.due=mdue.value;item.desc=mdesc.value;if(!id)state.tasks.unshift(item);closeModal();toast('Saved');render()}
function closeModal(){modal.classList.remove('show')} function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function generateTask(){state.tasks.unshift({id:'TASK-'+String(state.tasks.length+1).padStart(6,'0'),name:`Generated ${gfreq.value} Task`,business:gbiz.value,department:gdep.value,assignees:[gemp.value],lead:'Priya',priority:'Medium',status:'Ready',due:gdate.value,freq:gfreq.value,estimate:30,actual:0,watchers:['Sandhya'],sop:'',tags:'generated',desc:'Auto generated task'});toast('Task generated');state.tab='Tasks';render()}
function exportCSV(){let rows=[['Task No','Name','Business','Department','Assignees','Priority','Status','Due'],...visibleTasks().map(t=>[t.id,t.name,t.business,t.department,t.assignees.join('|'),t.priority,t.status,t.due])];let csv=rows.map(r=>r.map(x=>`"${String(x).replaceAll('"','""')}"`).join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='hridhiyam-tasks.csv';a.click()}
init();render();
</script>
</body></html>
