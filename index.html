<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hridhiyam Business OS</title><style>
:root{--bg:#f7f4ff;--card:#fff;--text:#151027;--muted:#6b6478;--pri:#5b2bbf;--pri2:#7b4dff;--line:#e8defa;--ok:#16a34a;--warn:#f59e0b;--bad:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial;background:linear-gradient(135deg,#faf8ff,#f4fff9);color:var(--text)}body.dark{--bg:#0f1020;--card:#181a2f;--text:#f7f3ff;--muted:#b8b0c9;--line:#2b2d4a;background:#0d0e1c}.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}aside{background:linear-gradient(180deg,#180735,#32106d);color:white;padding:22px;position:sticky;top:0;height:100vh}aside h2{font-size:20px;margin:0 0 4px}.ver{opacity:.75;margin:0 0 22px}nav button{width:100%;display:flex;gap:10px;align-items:center;padding:12px;border:0;border-radius:14px;background:transparent;color:white;text-align:left;cursor:pointer;margin:5px 0;font-weight:650}nav button.active,nav button:hover{background:rgba(255,255,255,.16)}main{padding:18px 24px}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:18px}.search{flex:1;display:flex;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:11px 14px;box-shadow:0 10px 30px #00000008}.search input{border:0;background:transparent;outline:0;width:100%;font-size:15px;color:var(--text)}select,input,textarea{background:var(--card);color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px}.btn{border:0;border-radius:12px;background:var(--pri);color:white;padding:10px 14px;font-weight:750;cursor:pointer}.btn.alt{background:var(--card);color:var(--text);border:1px solid var(--line)}h1{font-size:32px;margin:8px 0 16px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card,.panel,.task{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 16px 40px #32106d0d}.card span{color:var(--muted)}.card b{display:block;font-size:34px;margin-top:8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}.table{overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:18px}table{width:100%;border-collapse:collapse}th{background:#efe6ff;color:#27114d;text-align:left}th,td{padding:12px;border-bottom:1px solid var(--line);font-size:14px}body.dark th{background:#261943;color:#fff}.taskgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px}.task h3{margin:8px 0}.pill{display:inline-block;padding:5px 10px;border-radius:50px;background:#efe6ff;color:#51259a;font-size:12px;font-weight:800;margin-left:8px}.status{width:100%;margin:8px 0}.actions{display:flex;gap:8px;flex-wrap:wrap}.small{font-size:13px;color:var(--muted)}.list li{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid var(--line)}.denied{border-color:#ffb4b4;background:#fff5f5}.login-note{font-size:13px;color:var(--muted)}@media(max-width:850px){.app{grid-template-columns:1fr}aside{height:auto;position:relative}.cards,.grid{grid-template-columns:1fr}.top{flex-direction:column;align-items:stretch}}
</style></head><body><div class="app"><aside><h2>HRIDHIYAM OS</h2><p class="ver">v1.0 Direct GitHub</p><nav id="nav"></nav></aside><main><div class="top"><div class="search"><input id="search" placeholder="Global search tasks, employees, tags..."></div><select id="userSelect"></select><button class="btn alt" onclick="toggleDark()">Dark/Light</button></div><div id="view"></div></main></div><script>
const roles={Founder:'all',Admin:'all',Manager:'department',TeamLead:'team',Employee:'self',Intern:'self'};
const businesses=['SIA Jewels','SBX Media','Westory']; const departments=['Graphic Design','Video Editing','Social Media','Website','Finance','Customer Support'];
const statuses=['Ready','In Progress','Review','Revision','Completed']; const priorities=['Low','Medium','High','Urgent']; const frequencies=['Daily','Weekly','Monthly','Yearly','Custom'];
let employees=[{id:'u1',name:'Sandhya',role:'Founder',department:'All',business:'All',teamId:'t0'},{id:'u2',name:'Rahul',role:'TeamLead',department:'Graphic Design',business:'SIA Jewels',teamId:'t1'},{id:'u3',name:'Aman',role:'Employee',department:'Video Editing',business:'SIA Jewels',teamId:'t2'},{id:'u4',name:'Neha',role:'Employee',department:'Graphic Design',business:'SIA Jewels',teamId:'t1'},{id:'u5',name:'Priya',role:'Manager',department:'Finance',business:'SBX Media',teamId:'t3'}];
let library=[{id:'LIB-0001',name:'Design Instagram Feed Post',business:'SIA Jewels',department:'Graphic Design',role:'Designer',frequency:'Daily',priority:'High',estimated:30,dependsOn:'-',sop:'SOP/feed',tags:'social,design'},{id:'LIB-0002',name:'Design Instagram Story',business:'SIA Jewels',department:'Graphic Design',role:'Designer',frequency:'Daily',priority:'Medium',estimated:20,dependsOn:'-',sop:'SOP/story',tags:'story'},{id:'LIB-0003',name:'Edit Product Reel',business:'SIA Jewels',department:'Video Editing',role:'Editor',frequency:'Daily',priority:'High',estimated:45,dependsOn:'-',sop:'SOP/reel',tags:'reel'},{id:'LIB-0004',name:'Update Sales Report',business:'SBX Media',department:'Finance',role:'Executive',frequency:'Daily',priority:'High',estimated:40,dependsOn:'-',sop:'SOP/sales',tags:'finance'}];
let tasks=[{taskNo:'TASK-000001',title:'Design Instagram Feed Post',business:'SIA Jewels',department:'Graphic Design',assignees:['u2','u4'],watchers:['u1'],due:'2026-07-09',priority:'High',status:'Ready',estimated:30,actual:0,teamId:'t1',frequency:'Daily',sop:'SOP/feed',activity:['Task created','Assigned to Rahul and Neha'],deleted:false,archived:false},{taskNo:'TASK-000002',title:'Edit Product Reel',business:'SIA Jewels',department:'Video Editing',assignees:['u3'],watchers:['u1'],due:'2026-07-09',priority:'High',status:'In Progress',estimated:45,actual:10,teamId:'t2',frequency:'Daily',sop:'SOP/reel',activity:['Task created'],deleted:false,archived:false}];
let page='dashboard',user=employees[0],q='';
function can(action,t){let s=roles[user.role]; if(s==='all')return true; if(['library','settings','employees','business','departments'].includes(action))return false; if(!t)return true; if(s==='department')return t.department===user.department; if(s==='team')return t.teamId===user.teamId||t.assignees.includes(user.id); return t.assignees.includes(user.id)||t.watchers.includes(user.id)}
function visibleTasks(){return tasks.filter(t=>!t.deleted&&can('task',t)&&(t.title.toLowerCase().includes(q)||t.taskNo.toLowerCase().includes(q)))}
function init(){document.getElementById('userSelect').innerHTML=employees.map(e=>`<option value="${e.id}">${e.name} — ${e.role}</option>`).join('');document.getElementById('userSelect').onchange=e=>{user=employees.find(x=>x.id===e.target.value);render()};document.getElementById('search').oninput=e=>{q=e.target.value.toLowerCase();renderView()};render()}
function render(){renderNav();renderView()}
function renderNav(){let nav=[['dashboard','Dashboard'],['business','Businesses'],['departments','Departments'],['employees','Employees'],['library','Task Library'],['tasks','Tasks'],['attendance','Attendance'],['calendar','Calendar'],['reports','Reports'],['settings','Settings']];document.getElementById('nav').innerHTML=nav.filter(n=>can(n[0])).map(n=>`<button class="${page===n[0]?'active':''}" onclick="page='${n[0]}';renderView();renderNav()">${n[1]}</button>`).join('')}
function renderView(){let v=document.getElementById('view'); if(page==='dashboard')return dashboard(v); if(page==='library')return taskLibrary(v); if(page==='tasks')return taskBoard(v); if(page==='employees')return tablePage(v,'Employee Management',employees,['id','name','role','department','business','teamId']); if(page==='business')return master(v,'Business Management',businesses); if(page==='departments')return master(v,'Department Management',departments); if(page==='attendance')return attendance(v); if(page==='calendar')return tablePage(v,'Calendar',visibleTasks(),['taskNo','title','due','status','priority']); if(page==='reports')return reports(v); if(page==='settings')return settings(v)}
function dashboard(v){let vt=visibleTasks();v.innerHTML=`<h1>Dashboard</h1><p class="login-note">Current login: <b>${user.name}</b> (${user.role}). Employee ko sirf assigned tasks dikhte hain.</p><div class="cards"><div class="card"><span>Visible Tasks</span><b>${vt.length}</b></div><div class="card"><span>Pending</span><b>${vt.filter(t=>t.status!=='Completed').length}</b></div><div class="card"><span>Completed</span><b>${vt.filter(t=>t.status==='Completed').length}</b></div><div class="card"><span>Overdue</span><b>${vt.filter(t=>t.due<'2026-07-08'&&t.status!=='Completed').length}</b></div></div><div class="grid"><div class="panel"><h3>Permission Scope</h3><p>${user.role}: ${roles[user.role]}</p><p>Access UI hide se nahi, permission logic se control hai.</p></div><div class="panel"><h3>Today Overview</h3>${miniBars(vt)}</div></div>`}
function miniBars(vt){return statuses.map(s=>`<p>${s}: <b>${vt.filter(t=>t.status===s).length}</b></p>`).join('')}
function taskLibrary(v){v.innerHTML=`<h1>Master Task Library</h1><button class="btn" onclick="library.push({...library[0],id:'LIB-'+String(library.length+1).padStart(4,'0'),name:'New Template Task'});renderView()">+ Add Template</button>${table(library,['id','name','business','department','role','frequency','priority','estimated','dependsOn','sop','tags'])}<div class="panel"><h3>Task Generator</h3><div class="toolbar"><select id="gb">${businesses.map(x=>`<option>${x}</option>`)}</select><select id="gd">${departments.map(x=>`<option>${x}</option>`)}</select><select id="gf">${frequencies.map(x=>`<option>${x}</option>`)}</select><select id="ge">${employees.map(e=>`<option value="${e.id}">${e.name}</option>`)}</select><button class="btn" onclick="generateTasks()">Generate Tasks</button></div></div>`}
function generateTasks(){let b=gb.value,d=gd.value,f=gf.value,e=ge.value,emp=employees.find(x=>x.id===e);let list=library.filter(x=>x.business===b&&x.department===d&&x.frequency===f);list.forEach(x=>tasks.push({taskNo:'TASK-'+String(tasks.length+1).padStart(6,'0'),title:x.name,business:x.business,department:x.department,assignees:[e],watchers:['u1'],due:new Date().toISOString().slice(0,10),priority:x.priority,status:'Ready',estimated:x.estimated,actual:0,teamId:emp.teamId,frequency:x.frequency,sop:x.sop,activity:['Generated from library'],deleted:false,archived:false}));alert(list.length+' tasks generated');page='tasks';render()}
function taskBoard(v){let vt=visibleTasks();v.innerHTML=`<h1>Task Management</h1><div class="toolbar"><button class="btn" onclick="exportCSV()">Export CSV</button><button class="btn alt" onclick="bulkComplete()">Bulk Complete Visible</button><button class="btn alt">Bulk Import Excel/CSV Ready</button></div><div class="taskgrid">${vt.map(t=>`<div class="task"><b>${t.taskNo}</b><span class="pill">${t.priority}</span><h3>${t.title}</h3><p>${t.business} • ${t.department}</p><p class="small">Assignees: ${t.assignees.map(id=>employees.find(e=>e.id===id)?.name).join(', ')}</p><select class="status" onchange="updateTask('${t.taskNo}','status',this.value)">${statuses.map(s=>`<option ${t.status===s?'selected':''}>${s}</option>`)}</select><div class="actions"><button class="btn alt" onclick="updateTask('${t.taskNo}','actual',${t.actual+5})">+5m</button><button class="btn alt" onclick="updateTask('${t.taskNo}','archived',true)">Archive</button><button class="btn alt" onclick="updateTask('${t.taskNo}','deleted',true)">Trash</button></div><p class="small">Est ${t.estimated}m / Actual ${t.actual}m</p><details><summary>Timeline, SOP, comments, files</summary><ul>${t.activity.map(a=>`<li>${a}</li>`).join('')}</ul><p>SOP: ${t.sop}</p></details></div>`).join('')}</div>`}
function updateTask(no,key,val){tasks=tasks.map(t=>t.taskNo===no?{...t,[key]:val,activity:[...t.activity,`${user.name} updated ${key}`]}:t);renderView()}
function bulkComplete(){visibleTasks().forEach(t=>t.status='Completed');renderView()}
function exportCSV(){let rows=visibleTasks();let csv='Task,Title,Business,Department,Status,Priority,Due\n'+rows.map(t=>[t.taskNo,t.title,t.business,t.department,t.status,t.priority,t.due].join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='tasks.csv';a.click()}
function attendance(v){v.innerHTML=`<h1>Attendance</h1><div class="panel"><h3>Today</h3><div class="toolbar"><button class="btn">Check In</button><button class="btn alt">Break Start</button><button class="btn alt">Break End</button><button class="btn alt">Check Out</button></div><p>Working Hours, Late Entry, Overtime and history backend-ready.</p></div>`}
function reports(v){let vt=visibleTasks();v.innerHTML=`<h1>Reports</h1><div class="grid"><div class="panel"><h3>Department Performance</h3>${departments.map(d=>`<p>${d}: <b>${vt.filter(t=>t.department===d).length}</b></p>`).join('')}</div><div class="panel"><h3>Status Report</h3>${miniBars(vt)}</div></div>`}
function settings(v){v.innerHTML=`<h1>Settings</h1><div class="grid">${['Roles','Statuses','Priorities','Frequencies'].map((t,i)=>`<div class="panel"><h3>${t}</h3><ul class="list">${[Object.keys(roles),statuses,priorities,frequencies][i].map(x=>`<li>${x}<button class="btn alt">Edit</button></li>`).join('')}</ul></div>`).join('')}</div>`}
function master(v,title,items){v.innerHTML=`<h1>${title}</h1><div class="panel"><ul class="list">${items.map(i=>`<li>${i}<button class="btn alt">Edit</button></li>`).join('')}</ul></div>`}
function tablePage(v,title,rows,cols){v.innerHTML=`<h1>${title}</h1>${table(rows,cols)}`}
function table(rows,cols){return `<div class="table"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${Array.isArray(r[c])?r[c].join(', '):(r[c]??'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function toggleDark(){document.body.classList.toggle('dark')} init();
</script></body></html>
