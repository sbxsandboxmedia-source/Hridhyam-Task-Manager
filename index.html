<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hridhiyam Business OS V2</title>
  <meta name="description" content="Custom Business Operating System demo for task, attendance, reports and employee workflow." />
  <style>
    :root{--bg:#f7f5fb;--panel:#fff;--ink:#0b0620;--muted:#6c617d;--brand:#2b0d4f;--brand2:#6d39d7;--line:#e6d9fb;--good:#0f9f63;--warn:#f59e0b;--bad:#e5484d;--soft:#f1ebff;--shadow:0 20px 60px rgba(43,13,79,.12);}
    .dark{--bg:#0d0618;--panel:#160b29;--ink:#fff;--muted:#bdb2cc;--brand:#8b5cf6;--brand2:#c084fc;--line:#312044;--soft:#23133a;--shadow:0 20px 60px rgba(0,0,0,.35);}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top right,#e8fff6 0,#f7f5fb 32%,var(--bg) 70%);color:var(--ink)}
    .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,#17002f,#32106c);color:#fff;padding:26px 24px;position:sticky;top:0;height:100vh}.logo{font-size:26px;font-weight:900;letter-spacing:.4px}.ver{opacity:.75;margin-top:5px}.nav{margin-top:28px;display:grid;gap:9px}.nav button{border:0;background:transparent;color:#fff;text-align:left;padding:14px 16px;border-radius:15px;font-weight:800;cursor:pointer}.nav button.active,.nav button:hover{background:rgba(255,255,255,.17)}
    .main{padding:24px 28px 40px}.top{display:grid;grid-template-columns:1fr 190px 110px;gap:14px;align-items:center}.input,select,textarea{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:16px;padding:14px 16px;font-size:15px;outline:none}.btn{border:0;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:13px 18px;font-weight:900;cursor:pointer;box-shadow:0 12px 28px rgba(109,57,215,.22)}.btn.ghost{background:var(--panel);color:var(--brand);border:1px solid var(--line);box-shadow:none}.btn.good{background:linear-gradient(135deg,#0f9f63,#35c98a)}.btn.bad{background:linear-gradient(135deg,#e5484d,#f87171)}
    h1{font-size:34px;margin:26px 0 8px}.sub{color:var(--muted);margin-bottom:18px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:rgba(255,255,255,.82);background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}.kpi .label{color:var(--muted)}.kpi .num{font-size:34px;font-weight:950;margin-top:12px}.pill{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:var(--soft);color:var(--brand);font-weight:800;font-size:12px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.table{width:100%;border-collapse:collapse;overflow:hidden}.table th,.table td{padding:13px 12px;border-bottom:1px solid var(--line);font-size:14px;text-align:left}.table th{background:var(--soft);color:var(--brand);font-size:12px;text-transform:uppercase}.hidden{display:none}.status{border-radius:999px;padding:7px 10px;font-weight:900;font-size:12px}.Ready{background:#eef2ff;color:#4338ca}.Progress{background:#fff7ed;color:#c2410c}.Review{background:#ecfeff;color:#0e7490}.Revision{background:#fef2f2;color:#b91c1c}.Completed{background:#ecfdf5;color:#047857}.modal{position:fixed;inset:0;background:rgba(9,3,20,.58);display:none;align-items:center;justify-content:center;padding:20px}.modal.show{display:flex}.box{width:min(850px,96vw);max-height:90vh;overflow:auto;background:var(--panel);border-radius:28px;padding:24px;border:1px solid var(--line)}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.progressbar{height:12px;background:var(--soft);border-radius:999px;overflow:hidden}.progressbar span{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:999px}.toast{position:fixed;right:22px;bottom:22px;background:var(--ink);color:var(--panel);padding:14px 18px;border-radius:16px;display:none}.toast.show{display:block}
    @media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.main{padding:18px}.top,.grid4,.grid3,.grid2,.formgrid{grid-template-columns:1fr}.table{display:block;overflow-x:auto}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side"><div class="logo">HRIDHIYAM OS</div><div class="ver">v2.0 Direct GitHub</div><div class="nav" id="nav"></div></aside>
  <main class="main">
    <div class="top"><input id="search" class="input" placeholder="Global search tasks, employees, departments, tags..."/><select id="role"></select><button class="btn ghost" id="theme">Dark/Light</button></div>
    <section id="view"></section>
  </main>
</div>
<div class="modal" id="modal"><div class="box"><div class="row" style="justify-content:space-between"><h2 id="modalTitle">Add Task</h2><button class="btn ghost" onclick="closeModal()">Close</button></div><div id="modalBody"></div></div></div>
<div class="toast" id="toast"></div>
<script>
const state={role:'Founder',user:'Sandhya',dark:false,tab:'Dashboard',query:'',tasks:[
{id:'TASK-000001',name:'Design Instagram Feed Post',business:'SIA Jewels',department:'Graphic Design',assignees:['Rahul'],lead:'Priya',priority:'High',status:'Ready',due:'2026-07-09',freq:'Daily',estimate:30,actual:0,watchers:['Sandhya'],sop:'https://example.com/sop/design-feed',check:['Design','Caption','Export'],done:1,tags:'social,design',desc:'Create premium feed post.'},
{id:'TASK-000002',name:'Edit Product Reel',business:'SIA Jewels',department:'Video Editing',assignees:['Aman'],lead:'Priya',priority:'High',status:'Progress',due:'2026-07-09',freq:'Daily',estimate:45,actual:20,watchers:['Sandhya'],sop:'https://example.com/sop/reel',check:['Cut','Music','Export'],done:2,tags:'reel,video',desc:'Edit short product reel.'},
{id:'TASK-000003',name:'Upload Reel on Instagram',business:'SIA Jewels',department:'Social Media',assignees:['Neha'],lead:'Neha',priority:'Medium',status:'Review',due:'2026-07-10',freq:'Daily',estimate:15,actual:10,watchers:['Sandhya'],sop:'https://example.com/sop/upload',check:['Caption','Hashtag','Post'],done:2,tags:'instagram',desc:'Upload reel after edit approval.'},
{id:'TASK-000004',name:'Update Sales Sheet',business:'SBX Media',department:'Finance',assignees:['Priya'],lead:'Priya',priority:'Medium',status:'Completed',due:'2026-07-08',freq:'Daily',estimate:20,actual:18,watchers:['Sandhya'],sop:'',check:['Income','Expense','Profit'],done:3,tags:'finance',desc:'Update finance tracker.'}
],employees:[['Rahul','Graphic Design','Employee','Priya'],['Aman','Video Editing','Employee','Priya'],['Neha','Social Media','Team Lead','Neha'],['Priya','Operations','Manager','Sandhya'],['Sandhya','Founder','Founder','-']],biz:['SIA Jewels','SBX Media','Westory','YOLOX'],deps:['Graphic Design','Video Editing','Social Media','Finance','Website','Customer Support'],activity:['Sandhya created TASK-000001','Aman moved TASK-000002 to In Progress','Neha sent TASK-000003 for Review']};
const roles=['Founder','Admin','Manager','Team Lead','Employee','Intern']; const tabs=['Dashboard','Businesses','Departments','Employees','Task Library','Tasks','Task Generator','Attendance','Calendar','Reports','Settings'];
function canSee(t){ if(['Founder','Admin'].includes(state.role))return true; if(state.role==='Manager')return ['Priya','Sandhya'].includes(t.lead)||t.department==='Operations'; if(state.role==='Team Lead')return t.lead===state.user||t.assignees.includes(state.user); return t.assignees.includes(state.user)||t.watchers.includes(state.user)}
function visibleTasks(){let q=state.query.toLowerCase();return state.tasks.filter(canSee).filter(t=>!q||JSON.stringify(t).toLowerCase().includes(q))}
function isAdmin(){return ['Founder','Admin','Manager'].includes(state.role)}
function init(){document.body.classList.toggle('dark',state.dark);role.innerHTML=roles.map(r=>`<option ${r===state.role?'selected':''}>${r}</option>`).join('');nav.innerHTML=tabs.map(t=>`<button onclick="state.tab='${t}';render()" class="${state.tab===t?'active':''}">${t}</button>`).join('');role.onchange=e=>{state.role=e.target.value;state.user=state.role==='Employee'?'Rahul':state.role==='Team Lead'?'Neha':state.role==='Manager'?'Priya':'Sandhya';render()};theme.onclick=()=>{state.dark=!state.dark;init();render()};search.oninput=e=>{state.query=e.target.value;render()};}
function render(){init(); const v=document.getElementById('view'); const f=visibleTasks(); const pending=f.filter(t=>t.status!=='Completed').length; const completed=f.filter(t=>t.status==='Completed').length; const overdue=f.filter(t=>t.status!=='Completed'&&t.due<'2026-07-08').length; const title=`<h1>${state.tab}</h1><div class="sub">Current login: <b>${state.user}</b> (${state.role}). Employee ko sirf assigned tasks dikhte hain.</div>`;
 if(state.tab==='Dashboard')v.innerHTML=title+`<div class="grid4"><div class="card kpi"><div class="label">Visible Tasks</div><div class="num">${f.length}</div></div><div class="card kpi"><div class="label">Pending</div><div class="num">${pending}</div></div><div class="card kpi"><div class="label">Completed</div><div class="num">${completed}</div></div><div class="card kpi"><div class="label">Overdue</div><div class="num">${overdue}</div></div></div><br><div class="grid2"><div class="card"><h2>Permission Scope</h2><p>${state.role}: ${state.role==='Founder'||state.role==='Admin'?'all system data':state.role==='Team Lead'?'only own team tasks':'only own assigned/watched tasks'}</p><p>Access UI hide se nahi, permission logic se control hai.</p><h3>Activity Timeline</h3>${state.activity.map(a=>`<p>• ${a}</p>`).join('')}</div><div class="card"><h2>Today Overview</h2>${['Ready','Progress','Review','Revision','Completed'].map(s=>`<p>${s}: <b>${f.filter(t=>t.status===s).length}</b></p>`).join('')}<h3>Productivity</h3><div class="progressbar"><span style="width:${f.length?Math.round(completed/f.length*100):0}%"></span></div></div></div>`;
 else if(state.tab==='Tasks'||state.tab==='Task Library')v.innerHTML=title+taskPage(f,state.tab==='Task Library');
 else if(state.tab==='Task Generator')v.innerHTML=title+generatorPage();
 else if(state.tab==='Employees')v.innerHTML=title+employeePage();
 else if(state.tab==='Businesses')v.innerHTML=title+listPage('Businesses',state.biz);
 else if(state.tab==='Departments')v.innerHTML=title+listPage('Departments',state.deps);
 else if(state.tab==='Attendance')v.innerHTML=title+attendancePage();
 else if(state.tab==='Calendar')v.innerHTML=title+calendarPage(f);
 else if(state.tab==='Reports')v.innerHTML=title+reportsPage(f);
 else if(state.tab==='Settings')v.innerHTML=title+settingsPage(); }
function taskPage(f,library){ if(library&&!isAdmin())return `<div class="card"><h2>Access Denied</h2><p>Task Library sirf Admin/Founder/Manager ko dikhegi.</p></div>`; return `<div class="row"><button class="btn" onclick="openTask()">+ New Task</button><button class="btn ghost" onclick="exportCSV()">Export CSV</button><button class="btn ghost" onclick="toast('Bulk import placeholder ready')">Bulk Import</button></div><br><div class="card"><table class="table"><thead><tr><th>Task No</th><th>Task</th><th>Business</th><th>Dept</th><th>Assignees</th><th>Priority</th><th>Status</th><th>Time</th><th>Action</th></tr></thead><tbody>${f.map(t=>`<tr><td>${t.id}</td><td><b>${t.name}</b><br><span class="sub">${t.tags}</span></td><td>${t.business}</td><td>${t.department}</td><td>${t.assignees.join(', ')}</td><td>${t.priority}</td><td><span class="status ${t.status}">${t.status}</span></td><td>${t.actual}/${t.estimate}m</td><td><button class="btn ghost" onclick="openTask('${t.id}')">Open</button></td></tr>`).join('')}</tbody></table></div>`}
function generatorPage(){return `<div class="grid2"><div class="card"><h2>Generate Tasks</h2><div class="formgrid"><select id="gbiz">${state.biz.map(x=>`<option>${x}</option>`).join('')}</select><select id="gdep">${state.deps.map(x=>`<option>${x}</option>`).join('')}</select><select id="gemp">${state.employees.map(e=>`<option>${e[0]}</option>`).join('')}</select><select id="gfreq"><option>Daily</option><option>Weekly</option><option>Monthly</option><option>Yearly</option></select><input class="input" id="gdate" type="date" value="2026-07-09"><select id="gfor"><option>1 Day</option><option>7 Days</option><option>30 Days</option></select></div><br><button class="btn" onclick="generateTask()">Generate Tasks</button></div><div class="card"><h2>Auto Rules</h2><p>Task Library → filter → Work Queue → Employee View</p><p>Recurring tasks, templates aur SOP attach future-ready architecture me included hain.</p></div></div>`}
function employeePage(){return `<div class="card"><table class="table"><thead><tr><th>Name</th><th>Department</th><th>Role</th><th>Team Lead / Manager</th><th>Visible Tasks</th></tr></thead><tbody>${state.employees.map(e=>`<tr><td><b>${e[0]}</b></td><td>${e[1]}</td><td>${e[2]}</td><td>${e[3]}</td><td>${state.tasks.filter(t=>t.assignees.includes(e[0])||t.lead===e[0]).length}</td></tr>`).join('')}</tbody></table></div>`}
function listPage(name,arr){return `<div class="grid3">${arr.map(x=>`<div class="card"><h2>${x}</h2><p class="sub">${name.slice(0,-1)} module</p><span class="pill">Active</span></div>`).join('')}</div>`}
function attendancePage(){return `<div class="grid4"><button class="btn good" onclick="toast('Checked in')">Check In</button><button class="btn ghost" onclick="toast('Break started')">Break Start</button><button class="btn ghost" onclick="toast('Break ended')">Break End</button><button class="btn bad" onclick="toast('Checked out')">Check Out</button></div><br><div class="card"><h2>Attendance History</h2><table class="table"><tr><th>Date</th><th>Employee</th><th>Check In</th><th>Check Out</th><th>Hours</th><th>Status</th></tr><tr><td>08/07/2026</td><td>${state.user}</td><td>10:05 AM</td><td>-</td><td>Running</td><td><span class="pill">Present</span></td></tr></table></div>`}
function calendarPage(f){return `<div class="grid3">${f.map(t=>`<div class="card"><span class="pill">${t.due}</span><h2>${t.name}</h2><p>${t.assignees.join(', ')} • ${t.status}</p></div>`).join('')}</div>`}
function reportsPage(f){let total=f.length, done=f.filter(t=>t.status==='Completed').length;return `<div class="grid3"><div class="card"><h2>Employee Performance</h2><div class="progressbar"><span style="width:${total?done/total*100:0}%"></span></div><p>${done}/${total} completed</p></div><div class="card"><h2>Department Performance</h2>${state.deps.slice(0,4).map(d=>`<p>${d}: <b>${f.filter(t=>t.department===d).length}</b></p>`).join('')}</div><div class="card"><h2>Business Performance</h2>${state.biz.map(b=>`<p>${b}: <b>${f.filter(t=>t.business===b).length}</b></p>`).join('')}</div></div>`}
function settingsPage(){return `<div class="grid2"><div class="card"><h2>System Settings</h2><p>Roles, Permissions, Priorities, Statuses, Frequencies, Businesses, Departments.</p><span class="pill">Version 2.0</span></div><div class="card"><h2>Future Ready</h2><p>Firebase/Supabase, API-ready, auto backup, PWA, offline support, notifications.</p></div></div>`}
function openTask(id){let t=state.tasks.find(x=>x.id===id)||{};modal.classList.add('show');modalTitle.textContent=id?'Task Details':'Create Task';modalBody.innerHTML=`<div class="formgrid"><input class="input" id="mname" placeholder="Task name" value="${t.name||''}"><select id="mbiz">${state.biz.map(x=>`<option ${x===t.business?'selected':''}>${x}</option>`).join('')}</select><select id="mdep">${state.deps.map(x=>`<option ${x===t.department?'selected':''}>${x}</option>`).join('')}</select><input class="input" id="mass" placeholder="Assignees comma separated" value="${(t.assignees||['Rahul']).join(', ')}"><select id="mstatus">${['Ready','Progress','Review','Revision','Completed'].map(x=>`<option ${x===t.status?'selected':''}>${x}</option>`).join('')}</select><select id="mpri"><option>High</option><option>Medium</option><option>Low</option></select><input class="input" id="mdue" type="date" value="${t.due||'2026-07-09'}"><input class="input" id="msop" placeholder="SOP link" value="${t.sop||''}"></div><br><textarea id="mdesc" rows="4" placeholder="Description">${t.desc||''}</textarea><br><br><button class="btn" onclick="saveTask('${id||''}')">Save Task</button> <button class="btn ghost" onclick="toast('Archived, restore possible')">Archive</button>`}
function saveTask(id){let item=id?state.tasks.find(x=>x.id===id):null;if(!item){item={id:'TASK-'+String(state.tasks.length+1).padStart(6,'0'),check:['Todo'],done:0,actual:0,estimate:30,watchers:['Sandhya'],tags:'custom'};state.tasks.unshift(item)} item.name=mname.value; item.business=mbiz.value; item.department=mdep.value; item.assignees=mass.value.split(',').map(x=>x.trim()).filter(Boolean); item.status=mstatus.value; item.priority=mpri.value; item.due=mdue.value; item.sop=msop.value; item.desc=mdesc.value; closeModal(); toast('Task saved with activity log'); render()}
function closeModal(){modal.classList.remove('show')} function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function generateTask(){state.tasks.unshift({id:'TASK-'+String(state.tasks.length+1).padStart(6,'0'),name:`Generated ${gfreq.value} Task`,business:gbiz.value,department:gdep.value,assignees:[gemp.value],lead:'Priya',priority:'Medium',status:'Ready',due:gdate.value,freq:gfreq.value,estimate:30,actual:0,watchers:['Sandhya'],sop:'',check:['Start','Complete'],done:0,tags:'generated',desc:'Auto generated task'});toast('Task generated');state.tab='Tasks';render()}
function exportCSV(){let rows=[['Task No','Name','Business','Department','Assignees','Priority','Status','Due'],...visibleTasks().map(t=>[t.id,t.name,t.business,t.department,t.assignees.join('|'),t.priority,t.status,t.due])];let csv=rows.map(r=>r.map(x=>`"${String(x).replaceAll('"','""')}"`).join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='hridhiyam-tasks.csv';a.click()}
init();render();
</script>
</body>
</html>
